<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Márgenes por Producto — Ramon Pico</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --orange:  #E05A00;
  --orange2: #CC5200;
  --bg:      #F5F5F7;
  --bg2:     #EBEBED;
  --border:  rgba(0,0,0,0.09);
  --text:    #0A0A0A;
  --muted:   #6C6C70;
  --white:   #FFFFFF;
  --green:   #2E7D32;
  --green-bg:#E8F5E9;
  --red:     #C62828;
  --red-bg:  #FFEBEE;
  --r:       8px;
  --r2:      12px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* ── LOGIN ── */
#loginScreen{
  position:fixed;inset:0;z-index:1000;background:var(--bg);
  display:flex;align-items:center;justify-content:center;
}
.login-card{
  background:var(--white);border:1px solid var(--border);
  border-radius:20px;padding:2.5rem;width:360px;
  box-shadow:0 20px 60px rgba(0,0,0,0.08);
}
.login-logo{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:.08em;margin-bottom:.25rem}
.login-logo span{color:var(--orange)}
.login-sub{font-size:.8rem;color:var(--muted);margin-bottom:2rem}
.login-input{
  width:100%;background:var(--bg);border:1px solid var(--border);
  border-radius:var(--r);padding:.75rem 1rem;font-family:'DM Sans',sans-serif;
  font-size:.95rem;outline:none;transition:border-color .2s;margin-bottom:1rem;
}
.login-input:focus{border-color:var(--orange)}
.login-btn{
  width:100%;background:var(--orange);color:#fff;font-weight:600;
  font-size:.95rem;padding:.85rem;border-radius:var(--r);border:none;cursor:pointer;
}
.login-btn:hover{background:var(--orange2)}
.login-error{font-size:.8rem;color:var(--red);margin-top:.5rem;display:none}

/* ── APP ── */
#app{display:none}

/* ── TOPNAV ── */
.topnav{
  position:sticky;top:0;z-index:100;
  background:rgba(245,245,247,0.95);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 2rem;height:60px;
}
.topnav-left{display:flex;align-items:center;gap:.75rem}
.topnav-logo{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:.08em}
.topnav-logo span{color:var(--orange)}
.topnav-badge{
  font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.08em;
  text-transform:uppercase;background:rgba(224,90,0,.1);color:var(--orange);
  border:1px solid rgba(224,90,0,.25);border-radius:100px;padding:.2rem .7rem;
}
.topnav-back{
  font-size:.8rem;color:var(--muted);cursor:pointer;
  display:flex;align-items:center;gap:.35rem;
  background:var(--bg2);border:1px solid var(--border);
  border-radius:100px;padding:.35rem .9rem;transition:all .2s;
  text-decoration:none;
}
.topnav-back:hover{border-color:var(--orange);color:var(--orange)}

/* ── CONTROLS ── */
.controls{
  display:flex;align-items:center;gap:.6rem;flex-wrap:wrap;
  padding:1rem 2rem;border-bottom:1px solid var(--border);
  background:var(--white);position:sticky;top:60px;z-index:50;
}
.ctrl-label{
  font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.08em;
  text-transform:uppercase;color:var(--muted);
}
.ctrl-select{
  font-family:'DM Mono',monospace;font-size:.78rem;font-weight:600;
  background:var(--bg);border:1px solid var(--border);border-radius:var(--r);
  padding:.35rem .65rem;color:var(--text);outline:none;cursor:pointer;
}
.filter-btn{
  font-size:.78rem;font-weight:500;padding:.35rem .9rem;
  border-radius:100px;border:1px solid var(--border);
  background:var(--bg);color:var(--muted);cursor:pointer;transition:all .2s;
}
.filter-btn.active{background:var(--orange);border-color:var(--orange);color:#fff;font-weight:600}
.search-wrap{position:relative;margin-left:auto}
.search-icon{position:absolute;left:.75rem;top:50%;transform:translateY(-50%);font-size:.78rem;pointer-events:none}
.filter-search{
  background:var(--bg);border:1px solid var(--border);border-radius:100px;
  padding:.4rem .9rem .4rem 2.2rem;font-family:'DM Sans',sans-serif;
  font-size:.82rem;outline:none;width:220px;transition:border-color .2s;
}
.filter-search:focus{border-color:var(--orange)}

/* ── KPI ROW ── */
.kpi-row{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:1rem;padding:1.25rem 2rem;background:var(--white);
  border-bottom:1px solid var(--border);
}
.kpi-card{
  background:var(--bg);border:1px solid var(--border);
  border-radius:var(--r2);padding:1rem 1.25rem;
}
.kpi-label{font-size:.72rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:.4rem}
.kpi-value{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;line-height:1;color:var(--text)}
.kpi-value.orange{color:var(--orange)}
.kpi-value.green{color:var(--green)}
.kpi-value.red{color:var(--red)}
.kpi-sub{font-size:.75rem;color:var(--muted);margin-top:.25rem}

/* ── CHART SECTION ── */
.chart-section{
  padding:1.5rem 2rem;background:var(--white);
  border-bottom:1px solid var(--border);
}
.chart-title{
  font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.1em;
  text-transform:uppercase;color:var(--muted);margin-bottom:1rem;font-weight:600;
}
.chart-wrap{position:relative;height:220px}

/* ── TABLE ── */
.table-wrap{padding:1.5rem 2rem}
table{width:100%;border-collapse:collapse;min-width:700px}
thead th{
  font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.08em;
  text-transform:uppercase;color:var(--muted);font-weight:600;
  padding:.6rem 1rem;border-bottom:2px solid var(--border);
  text-align:left;cursor:pointer;user-select:none;white-space:nowrap;
}
thead th:hover{color:var(--text)}
thead th.sorted{color:var(--orange)}
tbody tr{border-bottom:1px solid var(--border);transition:background .15s}
tbody tr:hover{background:var(--bg)}
tbody td{padding:.7rem 1rem;font-size:.83rem;vertical-align:middle}

.margin-bar-wrap{display:flex;align-items:center;gap:.5rem;min-width:120px}
.margin-bar-track{flex:1;height:5px;background:var(--bg3,#E0E0E3);border-radius:3px}
.margin-bar-fill{height:100%;border-radius:3px;transition:width .4s}

.badge{display:inline-block;padding:.2rem .55rem;border-radius:4px;font-size:.7rem;font-weight:600}
.badge-green{background:var(--green-bg);color:var(--green)}
.badge-orange{background:#FFF3E0;color:#E65100}
.badge-red{background:var(--red-bg);color:var(--red)}

.empty-state{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:.75rem;padding:4rem;color:var(--muted);
}
.spinner{
  width:24px;height:24px;border:2px solid var(--border);
  border-top-color:var(--orange);border-radius:50%;animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.table-loading{display:flex;align-items:center;gap:.75rem;padding:3rem;color:var(--muted);justify-content:center}

.sort-arrow{font-size:.55rem;margin-left:.2rem;opacity:.5}
.sort-arrow.visible{opacity:1;color:var(--orange)}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">Ramon<span>.</span>Pico</div>
    <div class="login-sub">Márgenes por Producto</div>
    <input type="password" class="login-input" id="loginPwd" placeholder="••••••••"
      onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">Ingresar</button>
    <div class="login-error" id="loginError">Contraseña incorrecta</div>
  </div>
</div>

<!-- APP -->
<div id="app">

  <nav class="topnav">
    <div class="topnav-left">
      <div class="topnav-logo">Ramon<span>.</span>Pico</div>
      <div class="topnav-badge">Márgenes</div>
    </div>
    <a class="topnav-back" href="../admin_v10.html">← Volver al Admin</a>
  </nav>

  <!-- CONTROLS -->
  <div class="controls">
    <span class="ctrl-label">Año</span>
    <select class="ctrl-select" id="selAnio" onchange="applyFilters()"></select>
    <span class="ctrl-label" style="margin-left:.5rem">Ordenar</span>
    <button class="filter-btn active" data-sort="margen_pct"  onclick="setSort(this,'margen_pct')">% Margen</button>
    <button class="filter-btn"        data-sort="margen_abs"  onclick="setSort(this,'margen_abs')">$ Margen</button>
    <button class="filter-btn"        data-sort="venta"       onclick="setSort(this,'venta')">Venta</button>
    <button class="filter-btn"        data-sort="costo"       onclick="setSort(this,'costo')">Costo</button>
    <button class="filter-btn"        data-sort="unidades"    onclick="setSort(this,'unidades')">Unidades</button>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" class="filter-search" id="searchInput"
        placeholder="Buscar producto, código..." oninput="applyFilters()">
    </div>
  </div>

  <!-- KPIs -->
  <div class="kpi-row" id="kpiRow">
    <div class="kpi-card"><div class="kpi-label">Cargando...</div></div>
  </div>

  <!-- CHART -->
  <div class="chart-section">
    <div class="chart-title">Top 10 productos — Margen bruto ($)</div>
    <div class="chart-wrap"><canvas id="barChart"></canvas></div>
  </div>

  <!-- TABLE -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th onclick="toggleSort('producto')">Producto <span class="sort-arrow" id="arr-producto"></span></th>
          <th onclick="toggleSort('codigo')">Código <span class="sort-arrow" id="arr-codigo"></span></th>
          <th onclick="toggleSort('unidades')">Uds. <span class="sort-arrow" id="arr-unidades"></span></th>
          <th onclick="toggleSort('costo')">Costo total <span class="sort-arrow" id="arr-costo"></span></th>
          <th onclick="toggleSort('venta')">Venta total <span class="sort-arrow" id="arr-venta"></span></th>
          <th onclick="toggleSort('margen_abs')">Margen $ <span class="sort-arrow" id="arr-margen_abs"></span></th>
          <th onclick="toggleSort('margen_pct')" style="min-width:160px">Margen % <span class="sort-arrow" id="arr-margen_pct"></span></th>
          <th>Categoría</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr><td colspan="8"><div class="table-loading"><div class="spinner"></div><span>Cargando datos...</span></div></td></tr>
      </tbody>
    </table>
  </div>

</div><!-- /app -->

<script>
const ADMIN_PASSWORD = 'ramonpico2025';
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwsQ2Aob4xsRtHi8r-OoAuGhGH3LKdSPerT1o9SlotkO_0tWGUdHYasgCqjOMJsTYZu/exec';

// ── STATE ──────────────────────────────────────────
let rawItems   = [];   // items from getComprasVentas, estado=cerrado
let productos  = [];   // aggregated by producto key
let filtered   = [];
let sortCol    = 'margen_pct';
let sortAsc    = false;
let barChart   = null;

// ── LOGIN ──────────────────────────────────────────
function doLogin() {
  const pwd = document.getElementById('loginPwd').value;
  if (pwd === ADMIN_PASSWORD) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadData();
  } else {
    document.getElementById('loginError').style.display = 'block';
    document.getElementById('loginPwd').value = '';
  }
}
document.getElementById('loginPwd').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

// ── LOAD ───────────────────────────────────────────
function gasJsonp(action) {
  return new Promise((resolve, reject) => {
    const cb = 'cb_' + action + '_' + Date.now();
    const script = document.createElement('script');
    let done = false;
    const t = setTimeout(() => { if (!done) { done=true; cleanup(); reject(new Error('Timeout')); }}, 30000);
    window[cb] = d => { if (!done) { done=true; clearTimeout(t); cleanup(); resolve(d); } };
    script.onerror = () => { if (!done) { done=true; clearTimeout(t); cleanup(); reject(new Error('Error red')); } };
    script.src = GAS_URL + '?action=' + action + '&callback=' + cb;
    function cleanup(){ delete window[cb]; if(script.parentNode) script.parentNode.removeChild(script); }
    document.head.appendChild(script);
  });
}

async function loadData() {
  try {
    const data = await gasJsonp('getComprasVentas');
    if (!data.success) throw new Error(data.error || 'Error GAS');
    // Solo ítems cerrados con venta real
    rawItems = (data.items || []).filter(i =>
      i.estado === 'cerrado' &&
      parseFloat(i.total_venta || 0) > 0 &&
      parseFloat(i.total_carbone || 0) > 0
    );
    buildAggregated();
    populateYearFilter();
    applyFilters();
  } catch(err) {
    document.getElementById('tableBody').innerHTML =
      `<tr><td colspan="8"><div class="empty-state"><span style="font-size:2rem">⚠️</span><span>${esc(err.message)}</span></div></td></tr>`;
  }
}

// ── AGGREGATE BY PRODUCTO ──────────────────────────
function buildAggregated() {
  const map = {};
  rawItems.forEach(item => {
    const key = (item.codigo_prod || '').trim() || (item.descripcion_prod || '').trim().toUpperCase();
    if (!key) return;
    if (!map[key]) {
      map[key] = {
        key,
        producto:  item.descripcion_prod || '—',
        codigo:    item.codigo_prod      || '—',
        unidades:  0,
        costo:     0,
        venta:     0,
        margen_abs:0,
        margen_pct:0,
        anios:     new Set(),
      };
    }
    const cant  = parseInt(item.cantidad || 1) || 1;
    const costo = parseFloat(item.total_carbone || 0);
    const venta = parseFloat(item.total_venta   || 0);
    map[key].unidades   += cant;
    map[key].costo      += costo;
    map[key].venta      += venta;
    map[key].margen_abs  = map[key].venta - map[key].costo;
    map[key].margen_pct  = map[key].venta > 0
      ? (map[key].margen_abs / map[key].venta) * 100 : 0;
    // Año desde fecha_venta
    const y = item.fecha_venta ? String(item.fecha_venta).substring(0,4) : null;
    if (y && y.length === 4) map[key].anios.add(y);
  });
  productos = Object.values(map).map(p => ({ ...p, anios: [...p.anios] }));
}

// ── YEAR FILTER ────────────────────────────────────
function populateYearFilter() {
  const years = new Set(['todos']);
  rawItems.forEach(i => {
    const y = i.fecha_venta ? String(i.fecha_venta).substring(0,4) : null;
    if (y && y.length === 4) years.add(y);
  });
  const sel = document.getElementById('selAnio');
  sel.innerHTML = [...years].sort((a,b) => b.localeCompare(a)).map(y =>
    `<option value="${y}">${y === 'todos' ? 'Todos los años' : y}</option>`
  ).join('');
  // Default to current year if available
  const cur = String(new Date().getFullYear());
  if (years.has(cur)) sel.value = cur;
}

// ── FILTERS + SORT ─────────────────────────────────
function applyFilters() {
  const anio = document.getElementById('selAnio').value;
  const q    = document.getElementById('searchInput').value.toLowerCase().trim();

  // Filter by year
  if (anio === 'todos') {
    filtered = [...productos];
  } else {
    // Re-aggregate only items from selected year
    const yearItems = rawItems.filter(i => {
      const y = i.fecha_venta ? String(i.fecha_venta).substring(0,4) : null;
      return y === anio;
    });
    const map = {};
    yearItems.forEach(item => {
      const key = (item.codigo_prod || '').trim() || (item.descripcion_prod || '').trim().toUpperCase();
      if (!key) return;
      if (!map[key]) map[key] = { key, producto: item.descripcion_prod||'—', codigo: item.codigo_prod||'—', unidades:0, costo:0, venta:0, margen_abs:0, margen_pct:0 };
      const cant  = parseInt(item.cantidad || 1) || 1;
      map[key].unidades   += cant;
      map[key].costo      += parseFloat(item.total_carbone || 0);
      map[key].venta      += parseFloat(item.total_venta   || 0);
      map[key].margen_abs  = map[key].venta - map[key].costo;
      map[key].margen_pct  = map[key].venta > 0 ? (map[key].margen_abs / map[key].venta)*100 : 0;
    });
    filtered = Object.values(map);
  }

  // Search
  if (q) filtered = filtered.filter(p =>
    (p.producto||'').toLowerCase().includes(q) ||
    (p.codigo||'').toLowerCase().includes(q)
  );

  // Sort
  filtered.sort((a, b) => {
    let va = a[sortCol] ?? 0, vb = b[sortCol] ?? 0;
    if (typeof va === 'string') return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
    return sortAsc ? va - vb : vb - va;
  });

  renderKPIs();
  renderChart();
  renderTable();
}

function setSort(btn, col) {
  sortCol = col;
  sortAsc = false;
  document.querySelectorAll('[data-sort]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function toggleSort(col) {
  if (sortCol === col) sortAsc = !sortAsc;
  else { sortCol = col; sortAsc = false; }
  document.querySelectorAll('[id^="arr-"]').forEach(el => { el.textContent=''; el.className='sort-arrow'; });
  const el = document.getElementById('arr-' + col);
  if (el) { el.textContent = sortAsc ? '▲' : '▼'; el.className = 'sort-arrow visible'; }
  // sync sort buttons
  document.querySelectorAll('[data-sort]').forEach(b =>
    b.classList.toggle('active', b.dataset.sort === col));
  applyFilters();
}

// ── KPIs ───────────────────────────────────────────
function renderKPIs() {
  const totalVenta    = filtered.reduce((s,p) => s + p.venta, 0);
  const totalCosto    = filtered.reduce((s,p) => s + p.costo, 0);
  const totalMargen   = totalVenta - totalCosto;
  const margenPct     = totalVenta > 0 ? (totalMargen / totalVenta)*100 : 0;
  const totalUnidades = filtered.reduce((s,p) => s + p.unidades, 0);
  const mejorPct      = filtered.length ? Math.max(...filtered.map(p=>p.margen_pct)) : 0;
  const mejorProd     = filtered.find(p => p.margen_pct === mejorPct);

  document.getElementById('kpiRow').innerHTML = `
    <div class="kpi-card">
      <div class="kpi-label">Productos únicos</div>
      <div class="kpi-value orange">${filtered.length}</div>
      <div class="kpi-sub">${totalUnidades} unidades vendidas</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Ventas totales</div>
      <div class="kpi-value">${fmt(totalVenta)}</div>
      <div class="kpi-sub">Costo: ${fmt(totalCosto)}</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Margen bruto</div>
      <div class="kpi-value ${totalMargen>=0?'green':'red'}">${fmt(totalMargen)}</div>
      <div class="kpi-sub">${margenPct.toFixed(1)}% sobre ventas</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Mejor margen</div>
      <div class="kpi-value green">${mejorPct.toFixed(1)}%</div>
      <div class="kpi-sub" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:180px" title="${esc(mejorProd?.producto||'—')}">${esc((mejorProd?.producto||'—').substring(0,35))}</div>
    </div>
  `;
}

// ── BAR CHART ──────────────────────────────────────
function renderChart() {
  const top10 = [...filtered]
    .sort((a,b) => b.margen_abs - a.margen_abs)
    .slice(0, 10);

  const labels  = top10.map(p => truncate(p.producto, 22));
  const margens = top10.map(p => parseFloat(p.margen_abs.toFixed(2)));
  const colors  = margens.map(v => v >= 0 ? 'rgba(46,125,50,.75)' : 'rgba(198,40,40,.75)');
  const borders = margens.map(v => v >= 0 ? '#2E7D32' : '#C62828');

  if (barChart) { barChart.destroy(); barChart = null; }
  const ctx = document.getElementById('barChart').getContext('2d');
  barChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        label: 'Margen $',
        data: margens,
        backgroundColor: colors,
        borderColor: borders,
        borderWidth: 1,
        borderRadius: 4,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: c => ' ' + fmt(c.raw) + '  (' +
              (top10[c.dataIndex]?.margen_pct.toFixed(1)||'0') + '%)'
          }
        }
      },
      scales: {
        x: { grid:{display:false}, ticks:{font:{size:11},color:'#6C6C70'} },
        y: {
          grid:{color:'rgba(0,0,0,0.05)'},
          ticks:{callback:v=>'$'+v, font:{size:11}, color:'#6C6C70'}
        }
      }
    }
  });
}

// ── TABLE ──────────────────────────────────────────
function renderTable() {
  const tbody = document.getElementById('tableBody');
  if (!filtered.length) {
    tbody.innerHTML = '<tr><td colspan="8"><div class="empty-state"><span style="font-size:2rem">📭</span><span>No hay datos</span></div></td></tr>';
    return;
  }
  const maxMargen = Math.max(...filtered.map(p => Math.abs(p.margen_abs)), 1);
  tbody.innerHTML = filtered.map(p => {
    const pct     = p.margen_pct;
    const barW    = Math.min(100, (Math.abs(p.margen_abs) / maxMargen) * 100);
    const barColor= p.margen_abs >= 0 ? '#2E7D32' : '#C62828';
    const badge   = pct >= 20  ? `<span class="badge badge-green">${pct.toFixed(1)}%</span>`
                  : pct >= 10  ? `<span class="badge badge-orange">${pct.toFixed(1)}%</span>`
                  : `<span class="badge badge-red">${pct.toFixed(1)}%</span>`;
    const margenColor = p.margen_abs >= 0 ? 'var(--green)' : 'var(--red)';
    return `<tr>
      <td>
        <div style="font-weight:500;max-width:280px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${esc(p.producto)}">${esc(truncate(p.producto,40))}</div>
      </td>
      <td><span style="font-family:'DM Mono',monospace;font-size:.72rem;color:var(--muted)">${esc(p.codigo)}</span></td>
      <td style="text-align:center;font-weight:600">${p.unidades}</td>
      <td style="font-family:'DM Mono',monospace;font-size:.78rem;color:var(--muted)">${fmt(p.costo)}</td>
      <td style="font-family:'Bebas Neue',sans-serif;font-size:1.1rem;color:var(--orange)">${fmt(p.venta)}</td>
      <td style="font-family:'Bebas Neue',sans-serif;font-size:1.05rem;color:${margenColor}">${fmt(p.margen_abs)}</td>
      <td>
        <div class="margin-bar-wrap">
          ${badge}
          <div class="margin-bar-track">
            <div class="margin-bar-fill" style="width:${barW}%;background:${barColor}"></div>
          </div>
        </div>
      </td>
      <td>${catBadge(p.costo, p.venta)}</td>
    </tr>`;
  }).join('');
}

function catBadge(costo, venta) {
  const pct = venta > 0 ? ((venta - costo)/venta)*100 : 0;
  if (pct >= 25) return '<span class="badge badge-green">Alto margen</span>';
  if (pct >= 12) return '<span class="badge badge-orange">Margen medio</span>';
  return '<span class="badge badge-red">Bajo margen</span>';
}

// ── UTILS ──────────────────────────────────────────
function fmt(n) {
  const v = parseFloat(n) || 0;
  return (v < 0 ? '-$' : '$') + Math.abs(v).toLocaleString('es-PA', {minimumFractionDigits:2, maximumFractionDigits:2});
}
function truncate(s, n) { return s && s.length > n ? s.substring(0,n)+'…' : (s||''); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
