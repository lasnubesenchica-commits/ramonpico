<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="RP Ops">
<meta name="theme-color" content="#0A0A0A">
<title>Operaciones — Ramon Pico</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
/* ════════════════════════════════════════════════════
   CSS — Mobile-first Operaciones
   ════════════════════════════════════════════════════ */
:root {
  --orange:    #E05A00;
  --orange2:   #CC5200;
  --orange-bg: rgba(224,90,0,.08);
  --bg:        #F5F5F7;
  --bg2:       #EBEBED;
  --bg3:       #E0E0E3;
  --border:    rgba(0,0,0,0.08);
  --text:      #0A0A0A;
  --muted:     #6C6C70;
  --chrome:    #AEAEB2;
  --white:     #FFFFFF;
  --green:     #2E7D32;
  --green-bg:  #E8F5E9;
  --yellow:    #F9A825;
  --yellow-bg: #FFF9C4;
  --blue:      #1565C0;
  --blue-bg:   #E3F2FD;
  --red:       #C62828;
  --red-bg:    #FFEBEE;
  --purple-bg: #F3E5F5;
  --r:         10px;
  --r2:        14px;
  --safe-top:  env(safe-area-inset-top, 0px);
  --safe-bot:  env(safe-area-inset-bottom, 0px);
}

*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html { scroll-behavior:smooth; -webkit-text-size-adjust:100%; }
body {
  font-family:'DM Sans',system-ui,sans-serif;
  background:var(--bg); color:var(--text);
  min-height:100vh; min-height:100dvh;
  -webkit-font-smoothing:antialiased;
  overscroll-behavior-y:contain;
}
button { font-family:inherit; cursor:pointer; border:none; background:none; }
input,select,textarea { font-family:inherit; }

/* ── LOGIN ── */
#loginScreen {
  position:fixed; inset:0; z-index:1000;
  background:var(--bg);
  display:flex; align-items:center; justify-content:center;
  padding:1.5rem;
}
.login-card {
  background:var(--white); border:1px solid var(--border);
  border-radius:20px; padding:2rem 1.75rem; width:100%; max-width:340px;
  box-shadow:0 20px 60px rgba(0,0,0,0.06);
}
.login-logo {
  font-family:'Bebas Neue',sans-serif; font-size:1.8rem;
  letter-spacing:.08em; margin-bottom:.2rem;
}
.login-logo span { color:var(--orange); }
.login-sub { font-size:.75rem; color:var(--muted); margin-bottom:1.5rem; }
.login-input {
  width:100%; background:var(--bg); border:1px solid var(--border);
  border-radius:var(--r); padding:.75rem 1rem; font-size:1rem;
  outline:none; transition:border-color .2s; margin-bottom:1rem;
  -webkit-appearance:none;
}
.login-input:focus { border-color:var(--orange); }
.login-btn {
  width:100%; background:var(--orange); color:#fff; font-weight:600;
  font-size:1rem; padding:.85rem; border-radius:var(--r);
  transition:background .2s;
}
.login-btn:active { background:var(--orange2); }
.login-error { font-size:.8rem; color:var(--red); margin-top:.5rem; display:none; }

/* ── APP SHELL ── */
#app { display:none; }

/* ── HEADER ── */
.header {
  position:sticky; top:0; z-index:100;
  padding:calc(var(--safe-top) + .5rem) 1rem .65rem;
  background:rgba(10,10,10,.96); backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  color:#fff;
}
.header-top {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:.5rem;
}
.header-logo {
  font-family:'Bebas Neue',sans-serif; font-size:1.25rem;
  letter-spacing:.08em;
}
.header-logo span { color:var(--orange); }
.header-badge {
  font-family:'DM Mono',monospace; font-size:.6rem; letter-spacing:.06em;
  text-transform:uppercase; color:var(--orange);
  background:rgba(224,90,0,.15); border:1px solid rgba(224,90,0,.3);
  border-radius:100px; padding:.15rem .55rem;
}
.header-actions {
  display:flex; gap:.5rem;
}
.header-btn {
  display:flex; align-items:center; gap:.35rem;
  font-size:.75rem; color:rgba(255,255,255,.7);
  background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.1);
  border-radius:100px; padding:.35rem .75rem;
  transition:all .2s; white-space:nowrap;
}
.header-btn:active { background:rgba(255,255,255,.15); }
.header-btn svg { width:14px; height:14px; }
.header-btn.syncing { opacity:.5; pointer-events:none; }

/* ── STATS ROW ── */
.stats-row {
  display:flex; gap:.4rem; overflow-x:auto; scrollbar-width:none;
  -webkit-overflow-scrolling:touch;
}
.stats-row::-webkit-scrollbar { display:none; }
.stat-chip {
  flex-shrink:0;
  display:flex; align-items:center; gap:.35rem;
  background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.08);
  border-radius:100px; padding:.25rem .6rem;
  font-size:.7rem; color:rgba(255,255,255,.6);
}
.stat-chip b {
  font-family:'Bebas Neue',sans-serif; font-size:1rem;
  line-height:1; color:#fff;
}
.stat-chip.active { border-color:var(--orange); color:var(--orange); }
.stat-chip.active b { color:var(--orange); }

/* ── FILTER TABS ── */
.filter-bar {
  display:flex; gap:.35rem; padding:.75rem 1rem;
  overflow-x:auto; scrollbar-width:none;
  -webkit-overflow-scrolling:touch;
  background:var(--white); border-bottom:1px solid var(--border);
  position:sticky; top:0; z-index:90;
}
.filter-bar::-webkit-scrollbar { display:none; }
.filter-tab {
  flex-shrink:0;
  font-size:.78rem; font-weight:500; color:var(--muted);
  background:var(--bg); border:1px solid var(--border);
  border-radius:100px; padding:.4rem .85rem;
  transition:all .15s; white-space:nowrap;
}
.filter-tab.active {
  background:var(--text); color:#fff;
  border-color:var(--text);
}
.filter-tab .count {
  display:inline-block; min-width:1.1rem; text-align:center;
  font-family:'DM Mono',monospace; font-size:.68rem;
  background:rgba(0,0,0,.08); border-radius:100px;
  padding:0 .35rem; margin-left:.3rem;
}
.filter-tab.active .count {
  background:rgba(255,255,255,.2);
}

/* ── SECTION GROUPS ── */
.section-group { padding:.5rem 0; }
.section-label {
  font-size:.68rem; font-weight:600; letter-spacing:.08em;
  text-transform:uppercase; color:var(--muted);
  padding:.5rem 1rem .25rem;
}
.section-count { color:var(--chrome); font-weight:400; }

/* ── CARDS ── */
.card {
  background:var(--white);
  border-bottom:1px solid var(--border);
  transition:background .2s;
}
.card:active { background:var(--bg); }
.card.expanded { background:var(--white); }

.card-main {
  display:flex; align-items:stretch; gap:.75rem;
  padding:.85rem 1rem;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}

.card-status {
  width:4px; border-radius:4px; flex-shrink:0;
  align-self:stretch;
}
.card-status.facturado  { background:var(--blue); }
.card-status.revisar    { background:var(--yellow); }
.card-status.pendiente  { background:var(--orange); }
.card-status.inventario { background:#7E57C2; }
.card-status.cerrado    { background:var(--green); }

.card-body { flex:1; min-width:0; }

.card-row1 {
  display:flex; align-items:center; justify-content:space-between;
  gap:.5rem; margin-bottom:.2rem;
}
.card-product {
  font-size:.88rem; font-weight:600; line-height:1.2;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  flex:1;
}
.card-total {
  font-family:'DM Mono',monospace; font-size:.88rem;
  font-weight:600; white-space:nowrap;
}
.card-total.venta { color:var(--green); }

.card-row2 {
  display:flex; align-items:center; gap:.5rem;
  flex-wrap:wrap;
}
.card-cliente {
  font-size:.76rem; color:var(--muted);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  max-width:60%;
}
.card-tag {
  font-size:.65rem; font-weight:600; letter-spacing:.04em;
  text-transform:uppercase;
  border-radius:100px; padding:.15rem .5rem;
}
.card-tag.facturado  { background:var(--blue-bg);   color:var(--blue); }
.card-tag.revisar    { background:var(--yellow-bg);  color:#E65100; }
.card-tag.pendiente  { background:var(--orange-bg);  color:var(--orange); }
.card-tag.inventario { background:var(--purple-bg);  color:#6A1B9A; }
.card-tag.cerrado    { background:var(--green-bg);   color:var(--green); }

.card-date {
  font-size:.68rem; color:var(--chrome);
  margin-left:auto; white-space:nowrap;
}

.card-chevron {
  display:flex; align-items:center; flex-shrink:0;
  color:var(--chrome); transition:transform .25s ease;
}
.card.expanded .card-chevron { transform:rotate(90deg); }
.card-chevron svg { width:18px; height:18px; }

/* ── EXPANDED PANEL ── */
.card-expand {
  max-height:0; overflow:hidden;
  transition:max-height .35s cubic-bezier(0.25,0.46,0.45,0.94);
}
.card.expanded .card-expand {
  max-height:800px;
  transition:max-height .4s cubic-bezier(0.25,0.46,0.45,0.94);
}

.card-detail {
  padding:0 1rem 1rem 1.75rem;
  border-top:1px solid var(--border);
}

.detail-grid {
  display:grid; grid-template-columns:1fr 1fr;
  gap:.5rem; margin-top:.65rem;
}
.detail-item {
  font-size:.75rem;
}
.detail-label {
  font-size:.62rem; font-weight:600; letter-spacing:.06em;
  text-transform:uppercase; color:var(--chrome);
  margin-bottom:.1rem;
}
.detail-value {
  color:var(--text); word-break:break-word;
}
.detail-value a { color:var(--blue); text-decoration:underline; }

.detail-full { grid-column:1 / -1; }

/* ── ACTION BUTTONS ── */
.action-bar {
  display:flex; flex-direction:column; gap:.5rem;
  margin-top:.75rem;
}
.action-btn {
  display:flex; align-items:center; justify-content:center; gap:.4rem;
  width:100%; padding:.7rem; border-radius:var(--r);
  font-size:.85rem; font-weight:600;
  transition:all .15s;
}
.action-btn:active { transform:scale(.98); }
.action-btn.primary {
  background:var(--orange); color:#fff;
}
.action-btn.secondary {
  background:var(--bg); color:var(--text);
  border:1px solid var(--border);
}
.action-btn.success {
  background:var(--green); color:#fff;
}
.action-btn.blue {
  background:var(--blue); color:#fff;
}
.action-btn.small {
  padding:.5rem .75rem; font-size:.78rem;
}
.action-btn:disabled {
  opacity:.4; pointer-events:none;
}
.action-row {
  display:flex; gap:.5rem;
}
.action-row .action-btn { flex:1; }

/* ── UPLOAD ZONE ── */
.upload-zone {
  border:2px dashed var(--border);
  border-radius:var(--r);
  padding:1rem; text-align:center;
  margin-top:.5rem;
  transition:all .2s;
  cursor:pointer;
}
.upload-zone.has-file {
  border-color:var(--green); background:var(--green-bg);
}
.upload-zone-text {
  font-size:.8rem; color:var(--muted);
}
.upload-zone-text svg { width:24px; height:24px; display:block; margin:0 auto .3rem; }
.upload-zone-text .fname {
  font-weight:600; color:var(--text);
}
.upload-zone input[type="file"] { display:none; }

/* ── FILE PREVIEW ── */
.file-preview {
  margin-top:.5rem;
  border-radius:var(--r);
  overflow:hidden;
  max-height:180px;
}
.file-preview img {
  width:100%; display:block;
  object-fit:cover; max-height:180px;
}

/* ── MODAL OVERLAY ── */
.modal-overlay {
  position:fixed; inset:0; z-index:500;
  background:rgba(0,0,0,.45);
  backdrop-filter:blur(4px);
  -webkit-backdrop-filter:blur(4px);
  display:none; align-items:flex-end; justify-content:center;
  padding:0 0 var(--safe-bot);
}
.modal-overlay.show {
  display:flex;
  animation:fadeIn .2s ease;
}
@keyframes fadeIn { from{opacity:0} to{opacity:1} }

.modal-sheet {
  background:var(--white);
  border-radius:16px 16px 0 0;
  width:100%; max-width:500px;
  max-height:85vh; max-height:85dvh;
  overflow-y:auto;
  animation:slideUp .3s cubic-bezier(0.25,0.46,0.45,0.94);
}
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }

.modal-handle {
  width:36px; height:4px; background:var(--bg3);
  border-radius:100px; margin:.6rem auto .4rem;
}
.modal-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:.5rem 1.25rem .75rem;
  border-bottom:1px solid var(--border);
}
.modal-title {
  font-size:1rem; font-weight:700;
}
.modal-close {
  width:32px; height:32px; border-radius:50%;
  background:var(--bg); display:flex; align-items:center; justify-content:center;
  color:var(--muted);
}
.modal-body {
  padding:1rem 1.25rem 1.5rem;
}

/* ── FORM FIELDS ── */
.field { margin-bottom:.75rem; }
.field-label {
  font-size:.7rem; font-weight:600; letter-spacing:.06em;
  text-transform:uppercase; color:var(--muted);
  display:block; margin-bottom:.3rem;
}
.field-input {
  width:100%; background:var(--bg); border:1px solid var(--border);
  border-radius:var(--r); padding:.65rem .75rem; font-size:.9rem;
  outline:none; transition:border-color .2s;
  -webkit-appearance:none;
}
.field-input:focus { border-color:var(--orange); }
select.field-input { padding-right:2rem; }

.field-row {
  display:flex; gap:.5rem;
}
.field-row .field { flex:1; }

/* ── TOAST ── */
.toast {
  position:fixed; bottom:calc(1.5rem + var(--safe-bot));
  left:50%; transform:translateX(-50%);
  background:var(--text); color:#fff;
  font-size:.82rem; font-weight:500;
  padding:.65rem 1.25rem; border-radius:100px;
  z-index:600; opacity:0; pointer-events:none;
  transition:opacity .25s, transform .25s;
  white-space:nowrap; max-width:90vw;
}
.toast.show {
  opacity:1; pointer-events:auto;
  animation:toastIn .35s ease;
}
@keyframes toastIn {
  from{opacity:0;transform:translateX(-50%) translateY(10px)}
  to{opacity:1;transform:translateX(-50%) translateY(0)}
}

/* ── SPINNER ── */
.spinner {
  display:inline-block; width:16px; height:16px;
  border:2px solid rgba(255,255,255,.3);
  border-top-color:#fff; border-radius:50%;
  animation:spin .6s linear infinite;
}
.spinner.dark {
  border-color:rgba(0,0,0,.15);
  border-top-color:var(--text);
}
@keyframes spin { to{transform:rotate(360deg)} }

/* ── EMPTY STATE ── */
.empty-state {
  text-align:center; padding:3rem 1.5rem;
  color:var(--chrome);
}
.empty-state svg { width:48px; height:48px; margin-bottom:.75rem; opacity:.4; }
.empty-state p { font-size:.88rem; }

/* ── LOADING SKELETON ── */
.skeleton-card {
  padding:1rem; border-bottom:1px solid var(--border);
}
.skeleton-line {
  height:12px; background:var(--bg2); border-radius:6px;
  margin-bottom:.5rem;
  animation:pulse 1.5s infinite;
}
.skeleton-line.w60 { width:60%; }
.skeleton-line.w40 { width:40%; }
.skeleton-line.w80 { width:80%; }
@keyframes pulse {
  0%,100%{opacity:1} 50%{opacity:.4}
}

/* ── PULL TO REFRESH ── */
.ptr-indicator {
  text-align:center; padding:.5rem;
  font-size:.75rem; color:var(--muted);
  display:none;
}
.ptr-indicator.show { display:block; }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width:0; height:0; }
</style>
</head>

<body>

<!-- ════ LOGIN ════ -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">RAMON.<span>PICO</span></div>
    <div class="login-sub">Operaciones — Acceso Móvil</div>
    <input type="password" class="login-input" id="loginPwd"
           placeholder="Contraseña" autocomplete="off" inputmode="numeric">
    <button class="login-btn" id="loginBtn" onclick="doLogin()">Entrar</button>
    <div class="login-error" id="loginError">Contraseña incorrecta</div>
  </div>
</div>

<!-- ════ APP ════ -->
<div id="app">

  <!-- HEADER -->
  <div class="header" id="header">
    <div class="header-top">
      <div>
        <div class="header-logo">RAMON.<span>PICO</span></div>
        <span class="header-badge">Operaciones</span>
      </div>
      <div class="header-actions">
        <button class="header-btn" id="btnSync" onclick="doSync()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
          Sync
        </button>
        <button class="header-btn" onclick="doRefresh()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        </button>
      </div>
    </div>
    <div class="stats-row" id="statsRow"></div>
  </div>

  <!-- FILTER TABS -->
  <div class="filter-bar" id="filterBar"></div>

  <!-- CARD LIST -->
  <div id="cardList"></div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

</div>

<!-- ════ MODAL: Registrar Pago ════ -->
<div class="modal-overlay" id="modalPago">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-title">Registrar Pago</div>
      <button class="modal-close" onclick="closeModal('modalPago')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="pagoItemId">
      <div class="field">
        <label class="field-label">Forma de pago</label>
        <select class="field-input" id="pagoForma">
          <option value="Yappy">Yappy</option>
          <option value="Transferencia">Transferencia</option>
          <option value="Efectivo">Efectivo</option>
          <option value="Cheque">Cheque</option>
          <option value="ACH">ACH</option>
        </select>
      </div>
      <div class="field">
        <label class="field-label">Comprobante de pago</label>
        <div class="upload-zone" id="pagoUploadZone" onclick="document.getElementById('pagoFile').click()">
          <div class="upload-zone-text">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            Toca para subir imagen
          </div>
          <input type="file" id="pagoFile" accept="image/*,application/pdf" capture="environment" onchange="handleFileSelect(this,'pago')">
        </div>
        <div class="file-preview" id="pagoPreview" style="display:none"></div>
      </div>
      <button class="action-btn primary" id="pagoSubmitBtn" onclick="submitPago()">
        Registrar Pago y Cerrar Ciclo
      </button>
    </div>
  </div>
</div>

<!-- ════ MODAL: Venta Directa ════ -->
<div class="modal-overlay" id="modalVenta">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-title">Venta Directa (sin factura)</div>
      <button class="modal-close" onclick="closeModal('modalVenta')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="ventaItemId">
      <div class="field">
        <label class="field-label">Cliente</label>
        <input type="text" class="field-input" id="ventaNombre" placeholder="Nombre del cliente">
      </div>
      <div class="field-row">
        <div class="field">
          <label class="field-label">RUC / Cédula</label>
          <input type="text" class="field-input" id="ventaRuc" placeholder="Ej: 8-888-888">
        </div>
        <div class="field" style="max-width:80px">
          <label class="field-label">DV</label>
          <input type="text" class="field-input" id="ventaDv" placeholder="00" inputmode="numeric">
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label class="field-label">Total venta ($)</label>
          <input type="number" class="field-input" id="ventaTotal" placeholder="0.00" step="0.01" inputmode="decimal">
        </div>
        <div class="field">
          <label class="field-label">Fecha</label>
          <input type="date" class="field-input" id="ventaFecha">
        </div>
      </div>
      <div class="field">
        <label class="field-label">Forma de pago</label>
        <select class="field-input" id="ventaFormaPago">
          <option value="Efectivo">Efectivo</option>
          <option value="Yappy">Yappy</option>

// ════════════════════════════════════════════════════
//  JSONP HELPER
// ════════════════════════════════════════════════════

function jsonpGet(action, params = {}) {
  return new Promise((resolve, reject) => {
    const cb = '_cb_' + Date.now() + '_' + Math.random().toString(36).slice(2,8);
    const timeout = setTimeout(() => {
      delete window[cb];
      const el = document.getElementById('_j_' + cb);
      if (el) el.remove();
      reject(new Error('Timeout'));
    }, 60000);

    window[cb] = function(data) {
      clearTimeout(timeout);
      delete window[cb];
      const el = document.getElementById('_j_' + cb);
      if (el) el.remove();
      resolve(data);
    };

    const qs = new URLSearchParams({ action, callback: cb, ...params });
    const s = document.createElement('script');
    s.id = '_j_' + cb;
    s.src = GAS_URL + '?' + qs.toString();
    s.onerror = () => {
      clearTimeout(timeout);
      delete window[cb];
      s.remove();
      reject(new Error('Network error'));
    };
    document.body.appendChild(s);
  });
}

async function postJSON(payload) {
  const res = await fetch(GAS_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(payload),
  });
  return res.json();
}

// ════════════════════════════════════════════════════
//  CLASSIFY & SORT
// ════════════════════════════════════════════════════

function classifyItem(item) {
  const estado = String(item.estado || '').toLowerCase();
  const flag   = item.flag_revision;
  if (estado === 'facturado')            return 'facturado';
  if (flag && estado !== 'cerrado')      return 'revisar';
  if (estado === 'pendiente')            return 'pendiente';
  if (estado === 'inventario')           return 'inventario';
  if (estado === 'cerrado')              return 'cerrado';
  if (estado === 'vinculado')            return 'facturado'; // legacy
  return 'pendiente';
}

const PRIORITY_ORDER = ['facturado','revisar','pendiente','inventario','cerrado'];

function sortedFiltered() {
  let items = allItems.map(it => ({ ...it, _class: classifyItem(it) }));

  if (currentFilter !== 'todos') {
    items = items.filter(it => it._class === currentFilter);
  }

  items.sort((a, b) => {
    const pa = PRIORITY_ORDER.indexOf(a._class);
    const pb = PRIORITY_ORDER.indexOf(b._class);
    if (pa !== pb) return pa - pb;
    // Within same group sort by date descending
    return String(b.fecha_reg || '').localeCompare(String(a.fecha_reg || ''));
  });

  return items;
}

// ════════════════════════════════════════════════════
//  RENDER
// ════════════════════════════════════════════════════

function renderAll() {
  renderStats();
  renderFilters();
  renderCards();
}

function renderStats() {
  const counts = { facturado:0, revisar:0, pendiente:0, inventario:0, cerrado:0 };
  allItems.forEach(it => counts[classifyItem(it)]++);
  const total = allItems.length;

  document.getElementById('statsRow').innerHTML = `
    <div class="stat-chip ${currentFilter==='todos'?'active':''}">
      <b>${total}</b> Total
    </div>
    <div class="stat-chip ${currentFilter==='facturado'?'active':''}">
      <b>${counts.facturado}</b> Facturado
    </div>
    <div class="stat-chip ${currentFilter==='revisar'?'active':''}">
      <b>${counts.revisar}</b> Revisar
    </div>
    <div class="stat-chip ${currentFilter==='pendiente'?'active':''}">
      <b>${counts.pendiente}</b> Pendiente
    </div>
    <div class="stat-chip ${currentFilter==='inventario'?'active':''}">
      <b>${counts.inventario}</b> Inventario
    </div>
    <div class="stat-chip ${currentFilter==='cerrado'?'active':''}">
      <b>${counts.cerrado}</b> Cerrado
    </div>
  `;
}

function renderFilters() {
  const counts = { todos: allItems.length, facturado:0, revisar:0, pendiente:0, inventario:0, cerrado:0 };
  allItems.forEach(it => counts[classifyItem(it)]++);

  const tabs = [
    { id:'todos',      label:'Todos' },
    { id:'facturado',  label:'Facturado' },
    { id:'revisar',    label:'Revisar' },
    { id:'pendiente',  label:'Pendiente' },
    { id:'inventario', label:'Inventario' },
    { id:'cerrado',    label:'Cerrado' },
  ];

  document.getElementById('filterBar').innerHTML = tabs.map(t =>
    `<button class="filter-tab ${currentFilter===t.id?'active':''}"
             onclick="setFilter('${t.id}')">
      ${t.label}<span class="count">${counts[t.id]}</span>
    </button>`
  ).join('');
}

function setFilter(f) {
  currentFilter = f;
  expandedId = null;
  renderAll();
  document.getElementById('cardList').scrollIntoView({ behavior:'smooth', block:'start' });
}

function renderCards() {
  const items = sortedFiltered();
  if (!items.length) {
    document.getElementById('cardList').innerHTML = `
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        <p>No hay operaciones ${currentFilter !== 'todos' ? 'en este estado' : ''}</p>
      </div>`;
    return;
  }

  let html = '';
  let lastClass = null;

  items.forEach(it => {
    // Section header
    if (currentFilter === 'todos' && it._class !== lastClass) {
      const labels = {
        facturado:'📋 Facturado — Pendiente de pago',
        revisar:'⚠️ Revisar — Match de baja confianza',
        pendiente:'🔸 Pendiente — Sin factura emitida',
        inventario:'📦 Inventario',
        cerrado:'✅ Cerrado',
      };
      const count = items.filter(x => x._class === it._class).length;
      html += `<div class="section-label">${labels[it._class] || it._class} <span class="section-count">(${count})</span></div>`;
      lastClass = it._class;
    }

    const isExpanded = expandedId === it.id_item;
    const totalCarb  = parseFloat(it.total_carbone || 0);
    const totalVenta = parseFloat(it.total_venta   || 0);
    const fecha      = formatDateShort(it.fecha_compra || it.fecha_reg);

    html += `
    <div class="card ${isExpanded ? 'expanded' : ''}" id="card_${it.id_item}">
      <div class="card-main" onclick="toggleCard('${it.id_item}')">
        <div class="card-status ${it._class}"></div>
        <div class="card-body">
          <div class="card-row1">
            <div class="card-product">${esc(it.descripcion_prod || 'Sin descripción')}</div>
            <div class="card-total ${totalVenta > 0 ? 'venta' : ''}">${totalVenta > 0 ? '$' + totalVenta.toFixed(2) : '$' + totalCarb.toFixed(2)}</div>
          </div>
          <div class="card-row2">
            <span class="card-cliente">${esc(it.nombre_cliente || '—')}</span>
            <span class="card-tag ${it._class}">${tagLabel(it._class)}</span>
            <span class="card-date">${fecha}</span>
          </div>
        </div>
        <div class="card-chevron">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
        </div>
      </div>
      <div class="card-expand">
        ${isExpanded ? renderDetail(it) : ''}
      </div>
    </div>`;
  });

  document.getElementById('cardList').innerHTML = html;

  // Recalculate filter bar position after header
  adjustFilterPosition();
}

function toggleCard(id) {
  if (expandedId === id) {
    // Collapse
    expandedId = null;
    const card = document.getElementById('card_' + id);
    if (card) {
      card.classList.remove('expanded');
      card.querySelector('.card-expand').innerHTML = '';
    }
  } else {
    // Collapse previous
    if (expandedId) {
      const prev = document.getElementById('card_' + expandedId);
      if (prev) {
        prev.classList.remove('expanded');
        prev.querySelector('.card-expand').innerHTML = '';
      }
    }
    // Expand new
    expandedId = id;
    const card = document.getElementById('card_' + id);
    const item = allItems.find(it => it.id_item === id);
    if (card && item) {
      item._class = classifyItem(item);
      card.querySelector('.card-expand').innerHTML = renderDetail(item);
      card.classList.add('expanded');
      // Scroll into view
      setTimeout(() => {
        card.scrollIntoView({ behavior:'smooth', block:'nearest' });
      }, 100);
    }
  }
}

function renderDetail(it) {
  const totalCarb  = parseFloat(it.total_carbone || 0);
  const totalVenta = parseFloat(it.total_venta   || 0);
  const margen     = parseFloat(it.margen || 0);
  const confianza  = it.confianza_match || '';

  let detailHtml = `<div class="card-detail"><div class="detail-grid">`;

  // Common info
  detailHtml += detailCell('Producto', it.descripcion_prod || '—', true);
  detailHtml += detailCell('Código', it.codigo_prod || '—');
  detailHtml += detailCell('Fac. Carbone', it.num_fac_carbone || '—');
  detailHtml += detailCell('Costo Carbone', totalCarb > 0 ? '$' + totalCarb.toFixed(2) : '—');

  if (totalVenta > 0) {
    detailHtml += detailCell('Fac. Emitida', it.num_fac_emitida || '—');
    detailHtml += detailCell('Total Venta', '$' + totalVenta.toFixed(2));
    if (it.nombre_cliente) detailHtml += detailCell('Cliente', it.nombre_cliente);
    if (margen) detailHtml += detailCell('Margen', '$' + margen.toFixed(2));
  }

  if (confianza) detailHtml += detailCell('Confianza IA', confianza + '%');
  if (it.id_orden_web) detailHtml += detailCell('Orden Web', it.id_orden_web);

  // Drive links
  if (it.drive_url_carb) {
    detailHtml += `<div class="detail-item"><div class="detail-label">PDF Carbone</div><div class="detail-value"><a href="${esc(it.drive_url_carb)}" target="_blank">Ver PDF ↗</a></div></div>`;
  }
  if (it.drive_url_emit) {
    detailHtml += `<div class="detail-item"><div class="detail-label">PDF Emitida</div><div class="detail-value"><a href="${esc(it.drive_url_emit)}" target="_blank">Ver PDF ↗</a></div></div>`;
  }

  detailHtml += `</div>`; // close detail-grid

  // ── Action buttons by state ──
  detailHtml += `<div class="action-bar">`;

  if (it._class === 'facturado') {
    detailHtml += `
      <button class="action-btn primary" onclick="openPagoModal('${it.id_item}')">
        💳 Registrar Pago → Cerrar Ciclo
      </button>`;
  }

  if (it._class === 'revisar') {
    detailHtml += `
      <button class="action-btn blue" onclick="aprobarMatch('${it.id_item}')">
        ✅ Aprobar Match
      </button>`;
  }

  if (it._class === 'pendiente') {
    detailHtml += `
      <div class="action-row">
        <button class="action-btn primary" onclick="openFacturaModal('${it.id_item}')">
          📄 Subir Factura
        </button>
        <button class="action-btn secondary" onclick="openVentaModal('${it.id_item}')">
          💰 Venta Directa
        </button>
      </div>
      <div class="action-row">
        <button class="action-btn secondary small" onclick="moverInventario('${it.id_item}')">
          📦 Mover a Inventario
        </button>
        <button class="action-btn secondary small" onclick="marcarCostoOp('${it.id_item}')">
          🏷️ Costo Operativo
        </button>
      </div>`;
  }

  if (it._class === 'inventario') {
    detailHtml += `
      <div class="action-row">
        <button class="action-btn primary" onclick="openFacturaModal('${it.id_item}')">
          📄 Subir Factura Emitida
        </button>
        <button class="action-btn secondary" onclick="openVentaModal('${it.id_item}')">
          💰 Venta Directa
        </button>
      </div>`;
  }

  if (it._class === 'cerrado') {
    detailHtml += `
      <button class="action-btn secondary small" onclick="openCorregirModal('${it.id_item}','${esc(it.ingreso_id || '')}')">
        🔄 Corregir Comprobante
      </button>`;
  }

  detailHtml += `</div></div>`; // close action-bar, card-detail
  return detailHtml;
}

      updateLocalItem(idItem, { estado: 'facturado', flag_revision: false });

      toast('Error: ' + (data.error || ''), true);

}

async function submitPago() {
  const idItem    = document.getElementById('pagoItemId').value;
  const formaPago = document.getElementById('pagoForma').value;
  const btn       = document.getElementById('pagoSubmitBtn');

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Procesando...';

  try {
    let driveUrl = '';

    // If file attached, upload via doPost
    if (fileData.pago) {
      toast('Subiendo comprobante...');
      const uploadRes = await postJSON({
        action:      'registrarPagoOperacion',
        id_item:     idItem,
        forma_pago:  formaPago,
        imageBase64: fileData.pago.b64,
        imageMime:   fileData.pago.mime,
        imageName:   fileData.pago.name,
      });
      if (uploadRes.success) {
        updateLocalItem(idItem, { estado: 'cerrado', ingreso_id: uploadRes.ingresoId || '' });
        toast('✅ Pago registrado — Ciclo cerrado');
        closeModal('modalPago');
      } else {
        toast('Error: ' + (uploadRes.error || ''), true);
      }
    } else {
      // No file, use JSONP
      const data = await jsonpGet('registrarPagoOperacion', { id_item: idItem, forma_pago: formaPago });
      if (data.success) {
        updateLocalItem(idItem, { estado: 'cerrado', ingreso_id: data.ingresoId || '' });
        toast('✅ Pago registrado — Ciclo cerrado');
        closeModal('modalPago');
      } else {
        toast('Error: ' + (data.error || ''), true);
      }
    }
  } catch(e) {
    toast('Error de conexión', true);
  }

  btn.disabled = false;
  btn.innerHTML = 'Registrar Pago y Cerrar Ciclo';
}

  if (!nombre || !total) {
    toast('Cliente y total requeridos', true);
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Registrando...';

  try {
    const data = await jsonpGet('registrarVentaDirecta', {
      id_item:    idItem,
      nombre:     nombre,
      ruc:        document.getElementById('ventaRuc').value.trim(),
      dv:         document.getElementById('ventaDv').value.trim(),
      total:      total,
      fecha:      document.getElementById('ventaFecha').value,
      forma_pago: document.getElementById('ventaFormaPago').value,
      notas:      document.getElementById('ventaNotas').value.trim(),
    });
    if (data.success) {
      updateLocalItem(idItem, {
        estado: 'cerrado',
        nombre_cliente: nombre,
        total_venta: parseFloat(total),
        num_fac_emitida: 'VENTA-DIRECTA',
      });
      toast('✅ Venta directa registrada');
      closeModal('modalVenta');
    } else {
      toast('Error: ' + (data.error || ''), true);
    }
  } catch(e) {
    toast('Error de conexión', true);
  }

  btn.disabled = false;
  btn.innerHTML = 'Registrar Venta Directa';
}

// ── Subir Factura Emitida ──
function openFacturaModal(idItem) {
  document.getElementById('facturaItemId').value = idItem;
  fileData.factura = null;
  resetUploadZone('factura');
  document.getElementById('facturaSubmitBtn').disabled = true;
  openModal('modalFactura');
}

async function submitFacturaEmitida() {
  const idItem = document.getElementById('facturaItemId').value;
  const btn    = document.getElementById('facturaSubmitBtn');

  if (!fileData.factura) {
    toast('Selecciona un archivo primero', true);
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Analizando con IA...';

  try {
    const res = await postJSON({
      action:    'analizarFacturaPendiente',
      id_item:   idItem,
      pdfBase64: fileData.factura.b64,
      tipo:      'emitida',
    });

    if (res.success && res.data) {
      updateLocalItem(idItem, {
        estado: 'facturado',
        num_fac_emitida: res.data.num_factura || '',
        nombre_cliente: res.data.nombre_cliente || '',
        ruc_cliente: res.data.ruc_cliente || '',
        total_venta: parseFloat(res.data.total || 0),
      });
      toast('✅ Factura vinculada → Facturado');
      closeModal('modalFactura');
    } else {
      toast('Error: ' + (res.error || 'IA no pudo procesar'), true);
    }
  } catch(e) {
    toast('Error de conexión', true);
  }

  btn.disabled = false;
  btn.innerHTML = 'Analizar y Vincular Factura';
}

// ── Corregir Comprobante ──
function openCorregirModal(idItem, ingresoId) {
  document.getElementById('corregirItemId').value    = idItem;
  document.getElementById('corregirIngresoId').value = ingresoId;
  fileData.corregir = null;

// ════════════════════════════════════════════════════
//  FILE HANDLING
// ════════════════════════════════════════════════════

function handleFileSelect(input, type) {
  const file = input.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(e) {
    const b64full = e.target.result;
    const b64     = b64full.split(',')[1];
    const mime    = file.type || 'image/jpeg';

    fileData[type] = { b64, mime, name: file.name };

    // Update UI
    const zone = document.getElementById(type + 'UploadZone');
    zone.classList.add('has-file');
    zone.querySelector('.upload-zone-text').innerHTML =
      `<span class="fname">📎 ${file.name}</span>`;

    // Preview for images
    const preview = document.getElementById(type + 'Preview');
    if (mime.startsWith('image/')) {
      preview.innerHTML = `<img src="${b64full}" alt="Preview">`;
      preview.style.display = 'block';
    } else {
      preview.innerHTML = '';
      preview.style.display = 'none';
    }

    // Enable submit button
    const submitBtn = document.getElementById(type + 'SubmitBtn');
    if (submitBtn) submitBtn.disabled = false;
  };
  reader.readAsDataURL(file);
}

function resetUploadZone(type) {
  const zone = document.getElementById(type + 'UploadZone');
  zone.classList.remove('has-file');
  zone.querySelector('.upload-zone-text').innerHTML = `
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    Toca para subir archivo`;
  const preview = document.getElementById(type + 'Preview');
  if (preview) { preview.innerHTML = ''; preview.style.display = 'none'; }
  const fileInput = document.getElementById(type + 'File');
  if (fileInput) fileInput.value = '';
  fileData[type] = null;
}

// ════════════════════════════════════════════════════
//  OPTIMISTIC UI UPDATE
// ════════════════════════════════════════════════════

function updateLocalItem(idItem, updates) {
  const idx = allItems.findIndex(it => it.id_item === idItem);
  if (idx >= 0) {
    Object.assign(allItems[idx], updates);
  }
  expandedId = null;
  renderAll();
}

// ════════════════════════════════════════════════════
//  MODALS
// ════════════════════════════════════════════════════

function openModal(id) {
  const el = document.getElementById(id);
  el.classList.add('show');
  document.body.style.overflow = 'hidden';
  // Close on backdrop tap
  el.onclick = function(e) {
    if (e.target === el) closeModal(id);
  };
}

function closeModal(id) {
  const el = document.getElementById(id);
  el.classList.remove('show');
  document.body.style.overflow = '';
}

//  HELPERS
// ════════════════════════════════════════════════════

function esc(s) {
  const d = document.createElement('div');
  d.textContent = String(s || '');
  return d.innerHTML;
}

function tagLabel(cls) {
  const m = { facturado:'Facturado', revisar:'Revisar', pendiente:'Pendiente', inventario:'Inventario', cerrado:'Cerrado' };
  return m[cls] || cls;
}

function detailCell(label, value, full) {
  return `<div class="detail-item ${full ? 'detail-full' : ''}"><div class="detail-label">${label}</div><div class="detail-value">${esc(value)}</div></div>`;
}

function formatDateShort(d) {
  if (!d) return '';
  let s = String(d);
  if (d instanceof Date) {
    return d.toLocaleDateString('es-PA', { day:'2-digit', month:'short' });
  }
  // Try parse YYYY-MM-DD or DD/MM/YYYY
  const m = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (m) {
    const months = ['','Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
    return parseInt(m[3]) + ' ' + months[parseInt(m[2])];
  }
  const m2 = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if (m2) {
    const months = ['','Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
    return parseInt(m2[1]) + ' ' + months[parseInt(m2[2])];
  }
  return s.slice(0, 10);
}

function toast(msg, isError) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.background = isError ? 'var(--red)' : 'var(--text)';
  el.classList.add('show');
  clearTimeout(el._timer);
  el._timer = setTimeout(() => el.classList.remove('show'), 3000);
}

function showSkeleton() {
  document.getElementById('cardList').innerHTML = Array(5).fill(`
    <div class="skeleton-card">
      <div class="skeleton-line w80"></div>
      <div class="skeleton-line w40"></div>
    </div>
  `).join('');
}

function adjustFilterPosition() {
  const header = document.getElementById('header');
  const bar    = document.getElementById('filterBar');
  if (header && bar) {
    bar.style.top = header.offsetHeight + 'px';
  }
}

window.addEventListener('resize', adjustFilterPosition);
window.addEventListener('load', adjustFilterPosition);
